---
services:
  ipgate:
    image: ghcr.io/dombyte/ipgate:latest
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/config
    command:
      - "--log.level=ERROR"
      - "--config=/app/config/config.yaml"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "httpcheck", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
