version: 2

project_name: ipgate
before:
  hooks:
    - go mod tidy
    - go fmt ./...

builds:
  - id: ipgate-amd64-v2
    main: ./cmd/ipgate
    binary: ipgate
    goos:
      - linux
    goarch:
      - amd64
    goamd64:
      - v2
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

  - id: ipgate-amd64-v3
    main: ./cmd/ipgate
    binary: ipgate
    goos:
      - linux
    goarch:
      - amd64
    goamd64:
      - v3
