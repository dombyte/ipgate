port: "9092"
error_page: "/app/templates/error.html"
error_format: "json"
status_allowed: 200
status_denied: 403
debug_endpoint: true

headers:
  client_ip_header: "X-Forwarded-For"
  host_header: "X-Forwarded-Host"
  uri_header: "X-Forwarded-Uri"
  method_header: "X-Forwarded-Method"
  proto_header: "X-Forwarded-Proto"

cache:
  ttl: 60
  max_entries: 1000
  prune_interval: 30

blocklist_max_size: 1048576



groups:
  testgroup:
    whitelist_files:
      - path: "/blocklists/group1/whitelist.txt"
    whitelist_remotes:
      - url: "https://ipv64.net/whitelists/whitelist.txt"
        cron: "0 * * * *"
    blacklist_files:
      - path: "/blocklists/group1/ips.txt"
    blacklist_remotes:
      - url: "https://ipv64.net/blocklists/countries/ipv64_blocklist_AD.txt"
        cron: "0 * * * *"